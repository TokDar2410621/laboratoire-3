<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CEPI - Ajouter une publication</title>

    <link href="../Sass/style.css" rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../node_modules/jquery-ui-dist/jquery-ui.min.css">
</head>
<body>

    <div id="root"></div>

    <!-- Dialogue jQuery UI en dehors de React pour éviter les conflits -->
    <div id="confirmDialog" title="Confirmation" style="display:none;">
        <p>Voulez-vous vraiment publier cet article?</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../node_modules/jquery/dist/jquery.min.js"></script>
    <script src="../node_modules/jquery-ui-dist/jquery-ui.min.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="../js/api/api.js"></script>

    <script type="text/babel" src="../js/components/Header.jsx"></script>
    <script type="text/babel" src="../js/components/Footer.jsx"></script>
    <script type="text/babel" src="../js/components/AjoutPublication.jsx"></script>

    <script type="text/babel">
        function App() {
            return (
                <div>
                    <Header />
                    <AjoutPublication />
                    <Footer />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
